<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>항적_GPS교란_vs_정상_map_33R34L</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    <style>
        html, body, #map { width:100%; height:100%; margin:0; padding:0; }
        #loading {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            z-index:2000; background:white; padding:20px 30px; border-radius:8px;
            border:2px solid #aaa; font-family:Arial; font-size:15px;
            box-shadow:2px 2px 8px rgba(0,0,0,.3); text-align:center;
        }
        .legend {
            position:fixed; bottom:40px; left:40px; z-index:1000;
            background:white; padding:12px 16px; border-radius:8px;
            border:2px solid #aaa; font-family:Arial,sans-serif; font-size:13px;
            box-shadow:2px 2px 8px rgba(0,0,0,.3);
        }
        .layer-control {
            position:fixed; top:10px; right:10px; z-index:1000;
            background:white; padding:10px 14px; border-radius:8px;
            border:2px solid #aaa; font-family:Arial,sans-serif; font-size:13px;
            box-shadow:2px 2px 8px rgba(0,0,0,.3); max-height:90vh; overflow-y:auto;
        }
        .layer-control label { display:block; margin:3px 0; cursor:pointer; }
        .section-title { font-weight:bold; margin-top:8px; margin-bottom:2px; font-size:12px; color:#555; }
        .tile-btn {
            display:inline-block; margin:2px 3px 2px 0; padding:3px 10px;
            border:1px solid #aaa; border-radius:4px; cursor:pointer; font-size:12px;
            background:#f5f5f5; user-select:none;
        }
        .tile-btn.active { background:#1565C0; color:white; border-color:#1565C0; }
        .fix-label { background:none !important; border:none !important; }
    </style>
</head>
<body>
<div id="map"></div>
<div id="loading">&#9203; 항적 데이터 로딩 중...<br><small style="color:#888;">잠시만 기다려 주세요</small></div>

<div class="legend">
    <b>항적 범례</b><br>
    <span style="color:#C62828;">&#9632;</span> GPS 교란 항적<br>
    <span style="color:#1565C0;">&#9632;</span> GPS 정상 항적<br>
    <span style="font-size:10px;color:#555;">&#9679; 1분 간격 위치점</span><br>
    <hr style="margin:6px 0;border-color:#ddd;">
    <span style="font-size:12px;font-weight:bold;">픽스 마커 · STAR 경로</span><br>
    <span style="color:#27ae60;font-weight:bold;">&#9670;</span><span style="display:inline-block;width:18px;height:0;border-top:2px dashed #27ae60;vertical-align:middle;margin:0 3px;"></span> GUKDO 2E (동남쪽)<br>
    <span style="color:#f39c12;font-weight:bold;">&#9670;</span><span style="display:inline-block;width:18px;height:0;border-top:2px dashed #f39c12;vertical-align:middle;margin:0 3px;"></span> KARBU 2E (동쪽)<br>
    <span style="color:#e67e22;font-weight:bold;">&#9670;</span><span style="display:inline-block;width:18px;height:0;border-top:2px dashed #e67e22;vertical-align:middle;margin:0 3px;"></span> OLMEN 2E (남쪽)<br>
    <span style="color:#9b59b6;font-weight:bold;">&#9670;</span><span style="display:inline-block;width:18px;height:0;border-top:2px dashed #9b59b6;vertical-align:middle;margin:0 3px;"></span> REBIT 2A (서쪽)<br>
    <span style="color:#E65100;font-weight:bold;">&#9670;</span> FAF<br>
    <hr style="margin:6px 0;border-color:#ddd;">
    <span style="font-size:10px;color:#888;">&#9679; STAR 경로 내 웨이포인트</span>
    <hr style="margin:6px 0;border-color:#ddd;">
    <span style="font-size:11px;font-weight:bold;">평균 항적</span><br>
    <span style="display:inline-block;width:18px;height:3px;background:#C62828;vertical-align:middle;margin-right:4px;"></span><span style="font-size:11px;">교란 평균 (빨간 실선)</span><br>
    <span style="display:inline-block;width:18px;height:3px;background:#1565C0;vertical-align:middle;margin-right:4px;"></span><span style="font-size:11px;">정상 평균 (파란 실선)</span>
</div>

<div class="layer-control">
    <b>레이어</b>
    <div class="section-title">── 지도 배경 ──</div>
    <div>
        <span class="tile-btn active" id="btn-light" onclick="switchTile('light')">밝은색</span>
        <span class="tile-btn"        id="btn-dark"  onclick="switchTile('dark')">어두운색</span>
    </div>
    <div class="section-title">── GPS 교란 ──</div>
    <label><input type="checkbox" class="chk-track" data-group="disrupted" data-fix="GUKDO"> <span style="color:#C62828;">&#9632;</span> 교란 | GUKDO (동남쪽)</label>
    <label><input type="checkbox" class="chk-track" data-group="disrupted" data-fix="KARBU"> <span style="color:#C62828;">&#9632;</span> 교란 | KARBU (동쪽)</label>
    <label><input type="checkbox" class="chk-track" data-group="disrupted" data-fix="OLMEN"> <span style="color:#C62828;">&#9632;</span> 교란 | OLMEN (남쪽)</label>
    <label><input type="checkbox" class="chk-track" data-group="disrupted" data-fix="REBIT"> <span style="color:#C62828;">&#9632;</span> 교란 | REBIT (서쪽)</label>
    <div class="section-title">── GPS 정상 ──</div>
    <label><input type="checkbox" class="chk-track" data-group="normal" data-fix="GUKDO"> <span style="color:#1565C0;">&#9632;</span> 정상 | GUKDO (동남쪽)</label>
    <label><input type="checkbox" class="chk-track" data-group="normal" data-fix="KARBU"> <span style="color:#1565C0;">&#9632;</span> 정상 | KARBU (동쪽)</label>
    <label><input type="checkbox" class="chk-track" data-group="normal" data-fix="OLMEN"> <span style="color:#1565C0;">&#9632;</span> 정상 | OLMEN (남쪽)</label>
    <label><input type="checkbox" class="chk-track" data-group="normal" data-fix="REBIT"> <span style="color:#1565C0;">&#9632;</span> 정상 | REBIT (서쪽)</label>
    <div class="section-title">── 픽스 마커 · STAR 경로 ──</div>
    <label><input type="checkbox" id="chk-fix-GUKDO"> <span style="color:#27ae60;">&#9670;</span> <span style="display:inline-block;width:14px;height:0;border-top:2px dashed #27ae60;vertical-align:middle;margin:0 3px;"></span> GUKDO 2E (동남쪽)</label>
    <label><input type="checkbox" id="chk-fix-KARBU"> <span style="color:#f39c12;">&#9670;</span> <span style="display:inline-block;width:14px;height:0;border-top:2px dashed #f39c12;vertical-align:middle;margin:0 3px;"></span> KARBU 2E (동쪽)</label>
    <label><input type="checkbox" id="chk-fix-OLMEN"> <span style="color:#e67e22;">&#9670;</span> <span style="display:inline-block;width:14px;height:0;border-top:2px dashed #e67e22;vertical-align:middle;margin:0 3px;"></span> OLMEN 2E (남쪽)</label>
    <label><input type="checkbox" id="chk-fix-REBIT"> <span style="color:#9b59b6;">&#9670;</span> <span style="display:inline-block;width:14px;height:0;border-top:2px dashed #9b59b6;vertical-align:middle;margin:0 3px;"></span> REBIT 2A (서쪽)</label>
    <label><input type="checkbox" id="chk-faf" checked> <span style="color:#E65100;">&#9670;</span> FAF</label>
    <div class="section-title">── 평균 항적 ──</div>
    <label><input type="checkbox" id="chk-avg-교란_GUKDO"> <span style="display:inline-block;width:20px;height:3px;background:#C62828;vertical-align:middle;margin:0 3px;"></span> 교란 | GUKDO_평균값 (3547편)</label>
    <label><input type="checkbox" id="chk-avg-교란_KARBU"> <span style="display:inline-block;width:20px;height:3px;background:#C62828;vertical-align:middle;margin:0 3px;"></span> 교란 | KARBU_평균값 (143편)</label>
    <label><input type="checkbox" id="chk-avg-교란_OLMEN"> <span style="display:inline-block;width:20px;height:3px;background:#C62828;vertical-align:middle;margin:0 3px;"></span> 교란 | OLMEN_평균값 (2979편)</label>
    <label><input type="checkbox" id="chk-avg-교란_REBIT"> <span style="display:inline-block;width:20px;height:3px;background:#C62828;vertical-align:middle;margin:0 3px;"></span> 교란 | REBIT_평균값 (1867편)</label>
    <label><input type="checkbox" id="chk-avg-정상_GUKDO"> <span style="display:inline-block;width:20px;height:3px;background:#1565C0;vertical-align:middle;margin:0 3px;"></span> 정상 | GUKDO_평균값 (1047편)</label>
    <label><input type="checkbox" id="chk-avg-정상_KARBU"> <span style="display:inline-block;width:20px;height:3px;background:#1565C0;vertical-align:middle;margin:0 3px;"></span> 정상 | KARBU_평균값 (36편)</label>
    <label><input type="checkbox" id="chk-avg-정상_OLMEN"> <span style="display:inline-block;width:20px;height:3px;background:#1565C0;vertical-align:middle;margin:0 3px;"></span> 정상 | OLMEN_평균값 (673편)</label>
    <label><input type="checkbox" id="chk-avg-정상_REBIT"> <span style="display:inline-block;width:20px;height:3px;background:#1565C0;vertical-align:middle;margin:0 3px;"></span> 정상 | REBIT_평균값 (485편)</label>
</div>

<script>
var map = L.map('map', {preferCanvas: true}).setView([37.4602, 126.4407], 9);

var tileLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO', maxZoom: 20
}).addTo(map);
var tileDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO', maxZoom: 20
});

function switchTile(mode) {
    if (mode === 'light') {
        if (!map.hasLayer(tileLight)) { map.addLayer(tileLight); map.removeLayer(tileDark); }
        document.getElementById('btn-light').classList.add('active');
        document.getElementById('btn-dark').classList.remove('active');
    } else {
        if (!map.hasLayer(tileDark)) { map.addLayer(tileDark); map.removeLayer(tileLight); }
        document.getElementById('btn-dark').classList.add('active');
        document.getElementById('btn-light').classList.remove('active');
    }
}

L.marker([37.4602, 126.4407]).bindPopup('인천국제공항 (ICN)').addTo(map);

// ── 이름 텍스트 레이블 생성 함수 ──
function makeLabel(lat, lon, name, color) {
    return L.marker([lat, lon], {
        icon: L.divIcon({
            html: '<div style="font-size:9px;font-weight:bold;color:' + color +
                  ';text-shadow:0 0 2px #fff,-1px -1px 2px #fff,1px 1px 2px #fff;' +
                  'white-space:nowrap;text-align:center;line-height:1;">' + name + '</div>',
            iconSize: [60, 12], iconAnchor: [30, -9], className: 'fix-label'
        }),
        interactive: false
    });
}

// ── FAF 마커 (초기 표시) ──
var fafIcon = L.divIcon({
    html: '<div style="width:12px;height:12px;background:#E65100;border:2px solid #fff;' +
          'border-radius:2px;transform:rotate(45deg);box-shadow:0 0 3px rgba(0,0,0,.5);"></div>',
    iconSize:[12,12], iconAnchor:[6,6], className:''
});
var layerFAF = L.layerGroup().addTo(map);
[{"name": "GOKAK", "lat": 37.35066, "lon": 126.55847, "rwy": "RWY 33/34계열"}, {"name": "BODIK", "lat": 37.37702, "lon": 126.49497, "rwy": "RWY 33/34계열"}].forEach(function(f) {
    L.marker([f.lat, f.lon], {icon: fafIcon}).addTo(layerFAF);
    makeLabel(f.lat, f.lon, f.name, '#E65100').addTo(layerFAF);
});

// ── STAR 경로 팬 ──
map.createPane('starPane');
map.getPane('starPane').style.zIndex = 450;
map.createPane('wpPane');
map.getPane('wpPane').style.zIndex = 460;

// ── STAR 데이터 (웨이포인트 이름 + 좌표) ──
var STAR_DATA = {"GUKDO": {"name": "GUKDO 2E", "color": "#27ae60", "wp": [["GUKDO", 37.019694, 127.639694], ["KAKSO", 37.129056, 127.443722], ["GEO46", 37.199889, 127.316194], ["ELMAP", 37.267111, 127.187472], ["TESIK", 37.271278, 126.909583], ["GEO23", 37.340778, 126.822972], ["GEO22", 37.387083, 126.761222], ["GEO16", 37.347333, 126.689389], ["GEO17", 37.292750, 126.737528], ["GEO20", 37.238194, 126.785611], ["GEO24", 37.183583, 126.833611], ["GEO28", 37.128972, 126.881528], ["GEO27", 37.081000, 126.829639], ["ENPIL", 37.160833, 126.726111]]}, "KARBU": {"name": "KARBU 2E", "color": "#f39c12", "wp": [["KARBU", 37.533056, 127.664444], ["EGOBA", 37.487417, 127.379417], ["KEO44", 37.373278, 127.277972], ["ELMAP", 37.267111, 127.187472], ["TESIK", 37.271278, 126.909583], ["GEO23", 37.340778, 126.822972], ["GEO22", 37.387083, 126.761222], ["GEO16", 37.347333, 126.689389], ["GEO17", 37.292750, 126.737528], ["GEO20", 37.238194, 126.785611], ["GEO24", 37.183583, 126.833611], ["GEO28", 37.128972, 126.881528], ["GEO27", 37.081000, 126.829639], ["ENPIL", 37.160833, 126.726111]]}, "OLMEN": {"name": "OLMEN 2E", "color": "#e67e22", "wp": [["OLMEN", 36.737056, 126.991000], ["DY037", 36.936806, 126.885667], ["BOBIB", 37.092111, 127.066444], ["DEO31", 37.186444, 126.984250], ["TESIK", 37.271278, 126.909583], ["GEO23", 37.340778, 126.822972], ["GEO22", 37.387083, 126.761222], ["GEO16", 37.347333, 126.689389], ["GEO17", 37.292750, 126.737528], ["GEO20", 37.238194, 126.785611], ["GEO24", 37.183583, 126.833611], ["GEO28", 37.128972, 126.881528], ["GEO27", 37.081000, 126.829639], ["ENPIL", 37.160833, 126.726111]]}, "REBIT": {"name": "REBIT 2A", "color": "#9b59b6", "wp": [["REBIT", 37.200833, 125.486861], ["PY049", 37.138306, 125.801278], ["PY037", 37.141139, 126.007000], ["CW001", 37.179806, 126.334333], ["CW002", 37.164556, 126.352056], ["CW003", 37.060111, 126.400222], ["CW004", 37.025083, 126.467111], ["CW005", 37.015083, 126.553389], ["PAMBI", 37.181750, 126.542889]]}};
var FIX_COLORS = {"GUKDO": "#27ae60", "KARBU": "#f39c12", "OLMEN": "#e67e22", "REBIT": "#9b59b6"};

// ── 픽스별 레이어 객체 ──
var fixMarkers   = {};   // Entry Fix 다이아몬드
var fixLabels    = {};   // 이름 텍스트
var fixPolylines = {};   // STAR 경로 선
var fixWpDots    = {};   // STAR 경로 웨이포인트 점

[{"name": "GUKDO", "lat": 37.019694, "lon": 127.639694, "dir": "동남쪽"}, {"name": "KARBU", "lat": 37.533056, "lon": 127.664444, "dir": "동쪽"}, {"name": "OLMEN", "lat": 36.737056, "lon": 126.991000, "dir": "남쪽"}, {"name": "REBIT", "lat": 37.200833, "lon": 125.486861, "dir": "서쪽"}].forEach(function(f) {
    var fix   = f.name;
    var color = FIX_COLORS[fix];
    var s     = STAR_DATA[fix];

    // Entry Fix 다이아몬드 마커
    fixMarkers[fix] = L.marker([f.lat, f.lon], {
        icon: L.divIcon({
            html: '<div style="width:14px;height:14px;background:' + color +
                  ';border:2px solid #fff;border-radius:2px;transform:rotate(45deg);' +
                  'box-shadow:0 0 4px rgba(0,0,0,.6);"></div>',
            iconSize:[14,14], iconAnchor:[7,7], className:''
        })
    });

    // 이름 텍스트 레이블
    fixLabels[fix] = makeLabel(f.lat, f.lon, fix, color);

    // STAR 경로 폴리라인
    var coords = s.wp.map(function(w) { return [w[1], w[2]]; });
    fixPolylines[fix] = L.polyline(coords, {
        pane: 'starPane',
        color: color,
        weight: 2.5,
        opacity: 0.85,
        dashArray: '10, 6'
    }).bindTooltip('STAR: ' + s.name, { sticky: true });

    // 각 웨이포인트 점 (layerGroup)
    fixWpDots[fix] = L.layerGroup();
    s.wp.forEach(function(w) {
        L.circleMarker([w[1], w[2]], {
            pane: 'wpPane',
            radius: 4,
            color: color,
            fillColor: color,
            fillOpacity: 0.85,
            weight: 1.5
        }).bindTooltip(w[0], { sticky: true })
          .addTo(fixWpDots[fix]);
    });
});

// ── 항적 레이어 (초기 비활성) ──
var FIXES  = ['GUKDO','KARBU','OLMEN','REBIT'];
var COLORS = {disrupted:'#C62828', normal:'#1565C0'};
var trackLayers = {};
FIXES.forEach(function(fix) {
    trackLayers['disrupted_' + fix] = L.layerGroup();
    trackLayers['normal_'    + fix] = L.layerGroup();
});

var canvasRenderer = L.canvas();

function renderByFix(data, group) {
    var color   = COLORS[group];
    var buckets = {};
    FIXES.forEach(function(fix) { buckets[fix] = []; });
    data.features.forEach(function(f) {
        var fix = f.properties.entry_fix;
        if (fix && buckets[fix]) buckets[fix].push(f);
    });
    FIXES.forEach(function(fix) {
        L.geoJSON({type:'FeatureCollection', features:buckets[fix]}, {
            renderer: canvasRenderer,
            style: function() { return {color:color, weight:1.5, opacity:0.05}; },
            pointToLayer: function(feature, latlng) {
                return L.circleMarker(latlng, {
                    renderer:canvasRenderer, radius:2.5,
                    color:color, fillColor:color, fillOpacity:0.05, weight:1
                });
            },
            onEachFeature: function(feature, layer) {
                var p = feature.properties;
                if (feature.geometry.type === 'Point')
                    layer.bindTooltip(p.flight + ' | ' + p.time, {sticky:true});
                else
                    layer.bindTooltip(p.flight + ' (' + p.faf + ')', {sticky:true});
            }
        }).addTo(trackLayers[group + '_' + fix]);
    });
}

var loadingEl = document.getElementById('loading');
Promise.all([
    fetch('tracks_disrupted_33r34l.geojson').then(function(r) { return r.json(); }),
    fetch('tracks_normal_33r34l.geojson').then(function(r) { return r.json(); })
]).then(function(results) {
    renderByFix(results[0], 'disrupted');
    renderByFix(results[1], 'normal');
    loadingEl.style.display = 'none';
}).catch(function(err) {
    loadingEl.innerHTML = '&#10060; 로딩 실패: ' + err.message +
        '<br><small>run_map.bat 을 실행하여 로컬 서버로 열어주세요.</small>';
});

// ── 이벤트 리스너 ──
document.querySelectorAll('.chk-track').forEach(function(chk) {
    chk.addEventListener('change', function() {
        var key = this.dataset.group + '_' + this.dataset.fix;
        if (this.checked) trackLayers[key].addTo(map);
        else              trackLayers[key].remove();
    });
});

FIXES.forEach(function(fix) {
    var chk = document.getElementById('chk-fix-' + fix);
    if (!chk) return;
    chk.addEventListener('change', function() {
        if (this.checked) {
            fixMarkers[fix].addTo(map);
            fixLabels[fix].addTo(map);
            fixPolylines[fix].addTo(map);
            fixWpDots[fix].addTo(map);
        } else {
            if (map.hasLayer(fixMarkers[fix]))   map.removeLayer(fixMarkers[fix]);
            if (map.hasLayer(fixLabels[fix]))    map.removeLayer(fixLabels[fix]);
            if (map.hasLayer(fixPolylines[fix])) map.removeLayer(fixPolylines[fix]);
            if (map.hasLayer(fixWpDots[fix]))    map.removeLayer(fixWpDots[fix]);
        }
    });
});

document.getElementById('chk-faf').addEventListener('change', function() {
    if (this.checked) layerFAF.addTo(map);
    else              layerFAF.remove();
});


// ── 평균 항적 레이어 ──
map.createPane('avgPane');
map.getPane('avgPane').style.zIndex = 470;
